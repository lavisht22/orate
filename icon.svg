<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>

  <!-- 8 bars, width=52, gap=24, total=8*76-24=584, start=(1024-584)/2=220 -->
  <g fill="#dfe6ee">
    <!-- Quiet intro -->
    <rect x="220" y="432" width="52" height="160" rx="26"/>

    <!-- Peak 1 -->
    <rect x="296" y="302" width="52" height="420" rx="26"/>
    <rect x="372" y="192" width="52" height="640" rx="26"/>
    <rect x="448" y="272" width="52" height="480" rx="26"/>

    <!-- Dip -->
    <rect x="524" y="392" width="52" height="240" rx="26"/>

    <!-- Peak 2 -->
    <rect x="600" y="252" width="52" height="520" rx="26"/>
    <rect x="676" y="342" width="52" height="340" rx="26"/>

    <!-- Quiet tail -->
    <rect x="752" y="442" width="52" height="140" rx="26"/>
  </g>
</svg>
